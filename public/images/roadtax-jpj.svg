<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <circle cx="800" cy="100" r="200" fill="rgba(14,165,233,0.15)"/>
<rect x="0" y="240" width="900" height="20" fill="rgba(255,255,255,0.08)"/>
<rect x="0" y="300" width="900" height="20" fill="rgba(255,255,255,0.06)"/>
<rect x="200" y="245" width="60" height="10" rx="2" fill="rgba(255,255,255,0.25)"/>
<rect x="420" y="245" width="60" height="10" rx="2" fill="rgba(255,255,255,0.25)"/>
<rect x="640" y="245" width="60" height="10" rx="2" fill="rgba(255,255,255,0.25)"/>
<text x="600" y="190" font-family="system-ui" font-size="90" opacity="0.12" fill="white">🚗</text>
  <!-- Bottom gradient overlay -->
  <rect width="900" height="506" fill="url(#overlay)"/>
  <!-- Category pill -->
  <rect x="48" y="48" width="128" height="32" rx="16" fill="#0ea5e9" opacity="0.92"/>
  <text x="60" y="69" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1">KERAJAAN</text>
  <!-- Title -->
  <text x="48" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">Renew Roadtax JPJ</text>
  <!-- Subtitle -->
  <text x="48" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.82)">Online 2025 — Panduan Lengkap</text>
  <!-- RakyatHub branding -->
  <rect x="48" y="455" width="120" height="28" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="60" y="474" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">RakyatHub</text>
</svg>