<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <polygon points="700,80 820,180 820,340 580,340 580,180" fill="rgba(2,132,199,0.2)" stroke="rgba(2,132,199,0.4)" stroke-width="2"/>
<rect x="640" y="250" width="80" height="90" fill="rgba(2,132,199,0.25)" stroke="rgba(2,132,199,0.4)" stroke-width="1.5"/>
<rect x="760" y="200" width="40" height="60" fill="rgba(125,211,252,0.2)"/>
<rect x="614" y="200" width="40" height="60" fill="rgba(125,211,252,0.2)"/>
<line x1="700" y1="80" x2="700" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Bottom gradient overlay -->
  <rect width="900" height="506" fill="url(#overlay)"/>
  <!-- Category pill -->
  <rect x="48" y="48" width="128" height="32" rx="16" fill="#0284c7" opacity="0.92"/>
  <text x="60" y="69" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1">HARTANAH</text>
  <!-- Title -->
  <text x="48" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">Kalkulator Loan Rumah</text>
  <!-- Subtitle -->
  <text x="48" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.82)">Kiraan Ansuran &amp; Kelayakan</text>
  <!-- RakyatHub branding -->
  <rect x="48" y="455" width="120" height="28" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="60" y="474" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">RakyatHub</text>
</svg>