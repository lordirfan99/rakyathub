<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <circle cx="780" cy="150" r="180" fill="rgba(34,197,94,0.12)"/>
<rect x="560" y="100" width="80" height="110" rx="4" fill="rgba(34,197,94,0.25)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
<rect x="660" y="140" width="80" height="70" rx="4" fill="rgba(34,197,94,0.3)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
<rect x="760" y="80" width="80" height="130" rx="4" fill="rgba(34,197,94,0.35)" stroke="rgba(34,197,94,0.5)" stroke-width="1.5"/>
<text x="575" y="258" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)">50%</text>
<text x="672" y="258" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)">30%</text>
<text x="771" y="258" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)">20%</text>
  <!-- Bottom gradient overlay -->
  <rect width="900" height="506" fill="url(#overlay)"/>
  <!-- Category pill -->
  <rect x="48" y="48" width="128" height="32" rx="16" fill="#22c55e" opacity="0.92"/>
  <text x="60" y="69" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1">KEWANGAN</text>
  <!-- Title -->
  <text x="48" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">Urus Duit Gaji</text>
  <!-- Subtitle -->
  <text x="48" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.82)">Bawah RM3,000 — Tips Bijak</text>
  <!-- RakyatHub branding -->
  <rect x="48" y="455" width="120" height="28" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="60" y="474" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">RakyatHub</text>
