<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <circle cx="760" cy="150" r="160" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.25)" stroke-width="2"/>
<circle cx="760" cy="150" r="110" fill="none" stroke="rgba(249,115,22,0.15)" stroke-width="1.5"/>
<text x="660" y="210" font-family="system-ui" font-size="100" opacity="0.1" fill="white">🔒</text>
<line x1="700" y1="80" x2="820" y2="200" stroke="rgba(249,115,22,0.2)" stroke-width="2"/>
  <!-- Bottom gradient overlay -->
  <rect width="900" height="506" fill="url(#overlay)"/>
  <!-- Category pill -->
  <rect x="48" y="48" width="167" height="32" rx="16" fill="#f97316" opacity="0.92"/>
  <text x="60" y="69" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1">KESELAMATAN</text>
  <!-- Title -->
  <text x="48" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">Cara Elak Scam</text>
  <!-- Subtitle -->
  <text x="48" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.82)">Pinjaman Online — Panduan Lengkap</text>
  <!-- RakyatHub branding -->
  <rect x="48" y="455" width="120" height="28" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="60" y="474" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">RakyatHub</text>
</svg>