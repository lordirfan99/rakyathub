<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <circle cx="800" cy="150" r="200" fill="rgba(99,102,241,0.15)"/>
<polyline points="480,200 560,180 640,195 720,170 800,185" stroke="rgba(99,102,241,0.5)" stroke-width="2" fill="none"/>
<rect x="500" y="100" width="3" height="100" fill="rgba(255,255,255,0.15)"/>
<rect x="600" y="120" width="3" height="80" fill="rgba(255,255,255,0.15)"/>
<rect x="700" y="90" width="3" height="110" fill="rgba(255,255,255,0.15)"/>
<rect x="800" y="130" width="3" height="70" fill="rgba(255,255,255,0.15)"/>
<text x="560" y="200" font-family="system-ui" font-size="80" opacity="0.12" fill="white">🚙</text>
  <!-- Bottom gradient overlay -->
  <rect width="900" height="506" fill="url(#overlay)"/>
  <!-- Category pill -->
  <rect x="48" y="48" width="128" height="32" rx="16" fill="#6366f1" opacity="0.92"/>
  <text x="60" y="69" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1">KEWANGAN</text>
  <!-- Title -->
  <text x="48" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">Kereta Fresh Graduate</text>
  <!-- Subtitle -->
  <text x="48" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.82)">Malaysia 2025 — Bajet &amp; Pilihan</text>
  <!-- RakyatHub branding -->
  <rect x="48" y="455" width="120" height="28" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="60" y="474" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">RakyatHub</text>
</svg>