<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <circle cx="760" cy="150" r="170" fill="rgba(16,185,129,0.12)"/>
<polyline points="500,280 560,240 620,250 680,190 740,210 800,150 860,160" stroke="rgba(16,185,129,0.6)" stroke-width="3" fill="none"/>
<circle cx="560" cy="240" r="5" fill="rgba(16,185,129,0.8)"/>
<circle cx="680" cy="190" r="5" fill="rgba(16,185,129,0.8)"/>
<circle cx="800" cy="150" r="5" fill="rgba(16,185,129,0.8)"/>
<text x="590" y="180" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)">+5.6%</text>
<text x="710" y="130" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)">+6.1%</text>
  <!-- Bottom gradient overlay -->
  <rect width="900" height="506" fill="url(#overlay)"/>
  <!-- Category pill -->
  <rect x="48" y="48" width="63" height="32" rx="16" fill="#10b981" opacity="0.92"/>
  <text x="60" y="69" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1">ASB</text>
  <!-- Title -->
  <text x="48" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">7 Kelebihan Simpanan ASB</text>
  <!-- Subtitle -->
  <text x="48" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.82)">Dividen Konsisten &amp; Modal Terjamin</text>
  <!-- RakyatHub branding -->
