<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>
  <!-- Decorative shapes -->
  <circle cx="750" cy="180" r="200" fill="rgba(139,92,246,0.2)"/>
<circle cx="680" cy="100" r="80" fill="rgba(167,139,250,0.15)"/>
<text x="660" y="190" font-family="system-ui" font-size="120" opacity="0.15" fill="white">RM</text>
<rect x="600" y="80" width="260" height="3" fill="rgba(255,255,255,0.1)"/>
<rect x="620" y="110" width="220" height="3" fill="rgba(255,255,255,0.1)"/>
<rect x="640" y="140" width="180" height="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Bottom gradient overlay -->
  <rect width="900" height="506" fill="url(#overlay)"/>
  <!-- Category pill -->
  <rect x="48" y="48" width="128" height="32" rx="16" fill="#8b5cf6" opacity="0.92"/>
  <text x="60" y="69" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1">KEWANGAN</text>
  <!-- Title -->
  <text x="48" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">Pinjaman Online</text>
  <!-- Subtitle -->
  <text x="48" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.82)">Panduan & Risiko 2025</text>
  <!-- RakyatHub branding -->
  <rect x="48" y="455" width="120" height="28" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="60" y="474" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="white">RakyatHub</text>
</svg>