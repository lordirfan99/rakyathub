# RakyatHub Image Sourcing Config v5
# Single source of truth — skills & cron prompts reference this only.
# DO NOT duplicate these rules anywhere else.
#
# IMAGE SELECTION FLOW (MANDATORY — follow for EVERY article):
#
#   Step 1 — TIER 1 (OG News / Real Image)
#   =========================================
#   Search for a real news/event photo FIRST, REGARDLESS of category.
#   Check if article mentions ANY of these:
#   - Government agency (JAKIM, KWSP, LHDN, JPJ, KPDN, KKM, MOF, SSM, etc.)
#   - Public figure (PM, Menteri, CEO, selebriti)
#   - Real company / brand
#   - Real event / announcement / press release
#   - Viral incident / news story / scandal
#   - Policy change / law / regulation
#
#   If YES → search news portals for OG image:
#     malaymail.com, thestar.com.my, sinarharian.com.my, astroawani.com,
#     nst.com.my, bharian.com.my, hmetro.com.my
#     → Extract og:image from the news URL
#     → MUST verify with vision_analyze or file check (>10KB, real JPEG)
#     → If valid → USE IT. Skip Step 2 & 3.
#
#   Step 2 — TIER 2 (Screenshot / Portal Capture)
#   ==============================================
#   Only if Step 1 produces NO valid image.
#   Use when article is about:
#   - Portal walkthrough / cara daftar / cara mohon / tutorial log masuk
#   - Government or corporate portal UI (MyTax, MyEG, JPJ, MyeHALAL, etc.)
#   - Viral social media post, digital scam, online chat screenshot
#   - E-commerce listing, app interface
#   → Capture via Chrome CDP (port 9222) — browser_navigate + browser_vision
#   → Crop relevant area
#
#   Step 3 — TIER 3 (AI-Generated Banner)
#   ======================================
#   ONLY if Steps 1 AND 2 produce NO valid image.
#   Use for conceptual/educational topics:
#   - Tips, guides, listicles, comparisons
#   - Lifestyle, health, career, education (general advice)
#   - Definitions, glossaries, financial concepts
#   → Generate via scripts/generate-hero-banner.py <slug> "<title>" --category <category>
#
#   NO STOCK PHOTOS EVER.
#
# =============================================================================
# CATEGORY REFERENCE — used ONLY for:
#   a) Determining the Tier 3 fallback banner style/prompt
#   b) Agency logo compositing for Tier 2 screenshots
#   c) Keyword matching as a SIGNAL to check Tier 1 possibilities
#
#   NOTE: The "fallback_tier" below is what you use when Tier 1 fails —
#   it does NOT mean "skip Tier 1 and go straight to this tier."
# =============================================================================

categories:
  berita_og:
    match_keywords:
      - # No automatic keywords — use Step 1 logic (check if article is news-based)
    fallback_tier: 1
    method: og_news
    description: "News-based article — Tier 1 is the EXPECTED source. Search news portals for OG image."

