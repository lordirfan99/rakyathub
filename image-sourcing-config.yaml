# Per-category prompt templates for Tier 3 — generated banner with title
# STYLE: Gradient abstract background with article title overlay (generated by generate-hero-banner.py)
# Looks like premium OG image / social media banner — clean, modern, minimalist with text.
# Pollinations provides the gradient background; Pillow overlays the title.
prompt_templates:
  umum_kesihatan: "abstract gradient banner teal to mint green, subtle hexagonal pattern, clean medical concept, no text, no people, minimalist, 1200x630"
  kerjaya_bisnes: "abstract gradient banner navy to gold, subtle geometric shapes, professional business concept, no text, no people, minimalist, 1200x630"
  pendidikan_student: "abstract gradient banner blue to purple, subtle dotted pattern, education concept, no text, no people, minimalist, 1200x630"
  hartanah_sewa: "abstract gradient banner warm orange to brown, subtle building line pattern, property concept, no text, no people, minimalist, 1200x630"
  insurans: "abstract gradient banner deep blue to teal, subtle shield pattern, protection concept, no text, no people, minimalist, 1200x630"
  teknologi: "abstract gradient banner dark purple to neon cyan, subtle grid pattern, technology concept, no text, no people, minimalist, 1200x630"
  default: "abstract gradient banner, clean modern financial concept, subtle geometric pattern, no text, no people, minimalist, professional, 1200x630"

# Prompt builder configuration
prompt_builder:
  subject_extract_instruction: "Given this article title and tags, describe in 8-12 words the single most visually concrete scene it should be illustrated with. Focus on Malaysian context. Output plain text only, no markdown, no quotes."
  fallback_prompt: "abstract gradient background, smooth blur, no text, no objects, minimalist banner 1200x630"
  script: "python3 scripts/generate-hero-banner.py <slug> <title> --category <category>"
  script_description: "Generates gradient banner via Pollinations + Pillow text overlay — OG image banner style"

# Relevance verification
verify:
  enabled: true
  threshold: 0.2  # keyword overlap ratio — publish if >= this
  max_retries: 1   # retry ai_gen once with stricter prompt
  strict_suffix: ", gradient abstract banner, no photography, no people, no text overlay, minimalist geometric, no stock photo"

# Audit logging
audit:
  log_file: "src/data/image-audit.jsonl"
  fields:
    - slug
    - title
    - category
    - tier_used
    - method
    - verified
    - image_path
    - timestamp

