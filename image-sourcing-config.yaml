# RakyatHub Image Sourcing Config v3
# Single source of truth — skills & cron prompts reference this only.
# DO NOT duplicate these rules anywhere else.
#
# TIER HIERARCHY:
#   Tier 1 (OG News)   → OpenGraph image from referenced news article URL
#   Tier 2 (Screenshot) → Screenshot of portal/website UI via browser
#   Tier 3 (Banner)    → Generated gradient banner with title overlay (fallback)
#
# Always try Tier 1 first, then Tier 2, then Tier 3.
# NO STOCK PHOTOS EVER.

categories:
  berita_og:
    match_keywords:
      - # Tier 1 — articles based on news sources
      # These take OG image from the news article URL referenced in the post
    tier: 1
    method: og_news
