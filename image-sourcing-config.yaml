# Per-category prompt templates for Tier 3 ai_gen
prompt_templates:
  umum_kesihatan: "Malaysian healthcare {subject} setting, realistic photo style, warm natural lighting, professional clinical environment, no text, no logos, 16:9 composition"
  kerjaya_bisnes: "Malaysian professional {subject} scene, modern workplace, natural lighting, diverse Malaysian people, realistic photography, no text, 16:9 composition"
  pendidikan_student: "Malaysian university {subject} scene, students studying on campus, natural daylight, warm tones, candid photography style, no text, 16:9 composition"
  hartanah_sewa: "Malaysian {subject} interior or exterior, modern property, warm lighting, clean minimalist style, realistic photo, no text, 16:9 composition"
  insurans: "Malaysian family or professional {subject} scene, warm protective tone, realistic stock photo style, no text, 16:9 composition"
  teknologi: "Modern Malaysian {subject} scene, clean tech environment, soft blue lighting, realistic photography, no text, 16:9 composition"
  default: "Malaysian {subject} scene, realistic photography, warm lighting, professional editorial style, no text, no logos, 16:9 composition"

# Prompt builder configuration
prompt_builder:
  subject_extract_instruction: "Given this article title and tags, describe in 8-12 words the single most visually concrete scene it should be illustrated with. Focus on Malaysian context. Output plain text only, no markdown, no quotes."
  fallback_prompt: "Malaysian lifestyle scene, realistic photography, warm natural lighting, professional editorial photo, no text, no logos, 16:9 composition"

# Relevance verification
verify:
  enabled: true
  threshold: 0.2  # keyword overlap ratio — publish if >= this
  max_retries: 1   # retry ai_gen once with stricter prompt
  strict_suffix: ", close-up, no abstract elements, no electronics, no circuit boards, no generic stock photo, photorealistic"

# Audit logging
audit:
  log_file: "src/data/image-audit.jsonl"
  fields:
    - slug
    - title
    - category
    - tier_used
    - method
    - verified
    - image_path
    - timestamp

