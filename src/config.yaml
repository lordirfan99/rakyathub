site:
  name: RakyatHub
  site: 'https://rakyathub.my'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: RakyatHub — Panduan Kewangan Rakyat Malaysia
    template: '%s — RakyatHub'
  description: "Jawapan kepada soalan rakyat Malaysia tentang kewangan, bantuan kerajaan, emas, KWSP, ASB dan banyak lagi."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: RakyatHub
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@rakyathub'
    site: '@rakyathub'
    cardType: summary_large_image

i18n:
  language: ms
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 9

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 3

analytics:
  vendors:
    googleAnalytics:
      id: "G-BT7BWSC51H"

ui:
  theme: 'light' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
