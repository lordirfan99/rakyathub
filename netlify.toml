[build]
  publish = "dist"
  command = "python3 scripts/deploy-api.py && npm run build"
  ignore = "exit 0"

[build.processing.html]
  pretty_urls = false

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
